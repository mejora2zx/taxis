<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxis Zubex</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;min-height:100vh}
:root{--blue:#0D18A8;--blue-dark:#0a1280;--white:#fff;--gray:#f8f9fa;--border:#dee2e6;--text:#212529;--muted:#6c757d;--success:#198754;--danger:#dc3545;--pending:#fff3cd;--done:#d4edda}
nav{background:var(--blue);color:#fff;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
nav .logo{font-weight:700;font-size:1.1rem}
nav .tabs{display:flex;gap:4px}
nav .tab{background:transparent;border:none;color:rgba(255,255,255,.7);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;transition:.2s}
nav .tab:hover{background:rgba(255,255,255,.15);color:#fff}
nav .tab.active{background:rgba(255,255,255,.2);color:#fff;font-weight:600}
nav .badge{background:#dc3545;color:#fff;border-radius:10px;font-size:.7rem;padding:1px 6px;margin-left:4px;font-weight:700}
main{max-width:960px;margin:0 auto;padding:1.5rem}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem}
.card-title{font-size:1rem;font-weight:700;color:var(--blue);margin-bottom:1.25rem}
label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
input,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:.9rem;color:var(--text);background:#fff;outline:none;transition:.2s}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(13,24,168,.1)}
.grid4{display:grid;grid-template-columns:1.2fr 1fr 1.8fr 1.5fr;gap:.75rem}
.op-card{background:var(--gray);border:1px solid var(--border);border-radius:8px;padding:1rem;position:relative;margin-bottom:.75rem}
.op-num{font-size:.75rem;font-weight:700;color:var(--blue);margin-bottom:.6rem}
.op-remove{position:absolute;top:8px;right:8px;background:none;border:none;color:#aaa;cursor:pointer;font-size:1.1rem;padding:2px 6px;border-radius:4px}
.op-remove:hover{color:var(--danger);background:#ffeaea}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:7px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-outline{background:#fff;border:1.5px solid var(--blue);color:var(--blue)}
.btn-outline:hover{background:#f0f2ff}
.btn-sm{padding:5px 12px;font-size:.8rem}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#157347}
.btn-row{display:flex;gap:.75rem;margin-top:1.25rem;align-items:center}
.badge-status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:700;text-transform:uppercase}
.badge-pending{background:var(--pending);color:#856404}
.badge-done{background:var(--done);color:#155724}
.sol-card{border:1px solid var(--border);border-radius:8px;margin-bottom:.75rem;overflow:hidden}
.sol-header{padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.sol-header.pending{background:var(--pending)}
.sol-header.done{background:var(--done)}
.sol-body{padding:1rem;border-top:1px solid var(--border);background:#fff}
.vig-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:.5rem}
.vig-table th{background:var(--gray);padding:7px 10px;text-align:left;font-size:.75rem;text-transform:uppercase;color:var(--muted);font-weight:600}
.vig-table td{padding:8px 10px;border-top:1px solid var(--border);vertical-align:middle}
.vig-table input{padding:6px 8px;font-size:.85rem}
.done-row{background:#f0faf4}
.tbl-wrap{overflow-x:auto}
table.bitacora{width:100%;font-size:.85rem;border-collapse:collapse}
.bitacora th{background:var(--blue);color:#fff;padding:9px 12px;text-align:left;font-size:.75rem;text-transform:uppercase;white-space:nowrap}
.bitacora td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.bitacora tr:hover td{background:#f8f9ff}
.login-box{background:#fff;border-radius:12px;border:1px solid var(--border);padding:2.5rem;max-width:340px;margin:3rem auto;text-align:center}
.login-box h3{color:var(--blue);margin-bottom:.5rem;font-size:1.1rem}
.login-box p{color:var(--muted);font-size:.85rem;margin-bottom:1.25rem}
.login-box input{margin-bottom:.75rem;text-align:center;letter-spacing:2px}
.login-error{color:var(--danger);font-size:.8rem;margin-bottom:.75rem;display:none}
#toast{position:fixed;bottom:24px;right:24px;background:#212529;color:#fff;padding:12px 20px;border-radius:8px;font-size:.9rem;opacity:0;pointer-events:none;transition:.3s;z-index:999}
#toast.show{opacity:1}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s infinite}
.section{display:none}.section.active{display:block}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state .icon{font-size:3rem;margin-bottom:.5rem}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <div class="logo">🚖 Taxis Zubex</div>
  <div class="tabs">
    <button class="tab active" onclick="showSection('solicitar',this)">Solicitar taxi</button>
    <button class="tab" onclick="pedirAcceso('vigilancia',this)" id="tab-vig">
      Vigilancia <span class="badge pulse" id="notif-badge" style="display:none">0</span>
    </button>
    <button class="tab" onclick="pedirAcceso('bitacora',this)">Bitácora</button>
  </div>
</nav>

<main>

  <div class="section active" id="sec-solicitar">
    <div class="card">
      <div class="card-title">📋 Nueva solicitud de taxi</div>
      <div id="personal-status" style="font-size:.8rem;color:var(--muted);margin-bottom:1rem">
        <span class="spinner"></span> Cargando catálogo de personal...
      </div>
      <div style="margin-bottom:1.25rem">
        <label>Solicitante (supervisor)</label>
        <input type="text" id="solicitante" placeholder="Tu nombre" style="max-width:380px">
      </div>
      <div id="ops-container"></div>
      <div class="btn-row">
        <button class="btn btn-outline btn-sm" id="btn-add-op" onclick="addOperador()">+ Agregar persona</button>
        <span id="op-count-info" style="font-size:.8rem;color:var(--muted)"></span>
      </div>
      <div class="btn-row" style="margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.25rem">
        <button class="btn btn-primary" onclick="enviarSolicitud()">🚖 Enviar solicitud a vigilancia</button>
        <span id="form-msg" style="font-size:.85rem;color:var(--danger)"></span>
      </div>
    </div>
  </div>

  <div class="section" id="sec-vigilancia">
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
        <div class="card-title" style="margin-bottom:0">🔔 Panel de vigilancia</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-outline" onclick="filterSol('all')" style="border-color:#aaa;color:#555">Todas</button>
          <button class="btn btn-sm btn-outline" onclick="filterSol('pending')">Pendientes</button>
          <button class="btn btn-sm" onclick="filterSol('done')" style="background:var(--done);border:1px solid #b8ddb8;color:#155724">Completadas</button>
        </div>
      </div>
    </div>
    <div id="sol-list"></div>
  </div>

  <div class="section" id="sec-bitacora">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem">
        <div class="card-title" style="margin-bottom:0">📒 Bitácora de taxis</div>
        <div style="display:flex;gap:.5rem;align-items:center">
          <input type="date" id="fil-fecha" style="width:160px" onchange="renderBitacora()">
          <button class="btn btn-sm btn-outline" onclick="document.getElementById('fil-fecha').value='';renderBitacora()">Limpiar</button>
          <button class="btn btn-sm btn-primary" onclick="exportarCSV()">⬇ CSV</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="bitacora">
          <thead>
            <tr><th>Fecha</th><th>Folio</th><th>N. Emp</th><th>Nombre</th><th>Dpto.</th><th>Destino</th><th>Unidad</th></tr>
          </thead>
          <tbody id="tbody-bitacora"></tbody>
        </table>
      </div>
      <div id="bitacora-empty" class="empty-state" style="display:none">
        <div class="icon">📭</div><div>Sin registros</div>
      </div>
    </div>
  </div>

  <div class="section" id="sec-login">
    <div class="login-box">
      <div style="font-size:2rem;margin-bottom:.75rem">🔒</div>
      <h3>Acceso restringido</h3>
      <p>Esta sección es solo para personal de vigilancia.</p>
      <input type="password" id="input-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')verificarPass()">
      <div class="login-error" id="pass-error">Contraseña incorrecta</div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="verificarPass()">Entrar</button>
    </div>
  </div>

</main>
<div id="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdWSDzYW3A-AATN-Jc909ADk28_XnSmZL6RewH9F8ipCwB2cr0FaoXAF4Gr-FyfGU/exec';
var PASS = 'vig2026';
var solicitudes = JSON.parse(localStorage.getItem('zx_taxis_sol') || '[]');
var personal = [];
var operadoresForm = [];
var accesoVigilancia = false;
var seccionPendiente = '';
var tabPendiente = null;

function saveState() {
  localStorage.setItem('zx_taxis_sol', JSON.stringify(solicitudes));
}

function showSection(id, btn) {
  var secs = document.querySelectorAll('.section');
  for (var i = 0; i < secs.length; i++) secs[i].classList.remove('active');
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  document.getElementById('sec-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'vigilancia') renderVigilancia();
  if (id === 'bitacora') renderBitacora();
}

function pedirAcceso(seccion, btn) {
  if (accesoVigilancia) { showSection(seccion, btn); return; }
  seccionPendiente = seccion;
  tabPendiente = btn;
  var secs = document.querySelectorAll('.section');
  for (var i = 0; i < secs.length; i++) secs[i].classList.remove('active');
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  document.getElementById('sec-login').classList.add('active');
  btn.classList.add('active');
  document.getElementById('input-pass').value = '';
  document.getElementById('pass-error').style.display = 'none';
  setTimeout(function() { document.getElementById('input-pass').focus(); }, 100);
}

function verificarPass() {
  var val = document.getElementById('input-pass').value;
  if (val === PASS) {
    accesoVigilancia = true;
    showSection(seccionPendiente, tabPendiente);
  } else {
    document.getElementById('pass-error').style.display = 'block';
    document.getElementById('input-pass').value = '';
    document.getElementById('input-pass').focus();
  }
}

function cargarPersonal() {
  var cbName = 'cbP_' + Date.now();
  var script = document.createElement('script');
  window[cbName] = function(data) {
    if (data.ok && data.personal.length > 0) {
      personal = data.personal;
      document.getElementById('personal-status').textContent = '✅ ' + personal.length + ' empleados cargados';
      setTimeout(function() { document.getElementById('personal-status').style.display = 'none'; }, 2000);
    } else {
      document.getElementById('personal-status').textContent = '⚠ No se pudo cargar el catálogo';
    }
    delete window[cbName]; script.remove();
  };
  script.onerror = function() { document.getElementById('personal-status').textContent = '⚠ Error al cargar catálogo'; };
  script.src = SCRIPT_URL + '?action=getPersonal&callback=' + cbName;
  document.head.appendChild(script);
}

function initForm() {
  operadoresForm = [];
  operadoresForm.push({nom:'', nombre:'', depto:'', destino:''});
  renderOpCards();
}

function addOperador() {
  if (operadoresForm.length >= 10) { showToast('Máximo 10 personas por solicitud'); return; }
  operadoresForm.push({nom:'', nombre:'', depto:'', destino:''});
  renderOpCards();
}

function removeOperador(i) {
  if (operadoresForm.length <= 1) return;
  operadoresForm.splice(i, 1);
  renderOpCards();
}

function renderOpCards() {
  var c = document.getElementById('ops-container');
  var html = '';
  var destinos = ['','CITADEL','HEB','LA FE','Y GRIEGA'];
  for (var i = 0; i < operadoresForm.length; i++) {
    var op = operadoresForm[i];
    html += '<div class="op-card">';
    html += '<div class="op-num">👤 Personal #' + (i+1) + '</div>';
    if (operadoresForm.length > 1) html += '<button class="op-remove" onclick="removeOperador(' + i + ')">✕</button>';
    html += '<div class="grid4">';
    html += '<div><label>Destino</label><select onchange="operadoresForm[' + i + '].destino=this.value">';
    for (var d = 0; d < destinos.length; d++) {
      html += '<option value="' + destinos[d] + '"' + (op.destino===destinos[d]?' selected':'') + '>' + (destinos[d]||'— Seleccionar —') + '</option>';
    }
    html += '</select></div>';
    html += '<div><label>N. Nómina</label><input type="text" placeholder="Ej. 3317" value="' + op.nom + '" oninput="onNomChange(' + i + ',this.value)"></div>';
    html += '<div><label>Nombre</label><input type="text" placeholder="Autocompletado" value="' + op.nombre + '" id="nombre-' + i + '" oninput="operadoresForm[' + i + '].nombre=this.value"></div>';
    html += '<div><label>Departamento</label><input type="text" placeholder="Autocompletado" value="' + op.depto + '" id="depto-' + i + '" oninput="operadoresForm[' + i + '].depto=this.value"></div>';
    html += '</div></div>';
  }
  c.innerHTML = html;
  document.getElementById('op-count-info').textContent = operadoresForm.length + '/10 personas';
  document.getElementById('btn-add-op').style.display = operadoresForm.length >= 10 ? 'none' : 'inline-flex';
}

function onNomChange(i, val) {
  operadoresForm[i].nom = val;
  for (var j = 0; j < personal.length; j++) {
    if (String(personal[j].nom).trim() === String(val).trim()) {
      operadoresForm[i].nombre = personal[j].nombre;
      operadoresForm[i].depto = personal[j].depto;
      document.getElementById('nombre-' + i).value = personal[j].nombre;
      document.getElementById('depto-' + i).value = personal[j].depto;
      break;
    }
  }
}

function enviarSolicitud() {
  var solicitante = document.getElementById('solicitante').value.trim();
  var msg = document.getElementById('form-msg');
  if (!solicitante) { msg.textContent = 'Ingresa tu nombre'; return; }
  var ops = [];
  for (var i = 0; i < operadoresForm.length; i++) {
    var o = operadoresForm[i];
    if (o.nom || o.nombre) ops.push({nom:o.nom, nombre:o.nombre, depto:o.depto, destino:o.destino, folio:'', unidad:'', guardado:false});
  }
  if (ops.length === 0) { msg.textContent = 'Agrega al menos una persona'; return; }
  for (var i = 0; i < ops.length; i++) {
    if (!ops[i].nom || !ops[i].nombre) { msg.textContent = 'Completa nómina y nombre de todas las personas'; return; }
    if (!ops[i].destino) { msg.textContent = 'Selecciona destino para todas las personas'; return; }
  }
  msg.textContent = '';
  var ahora = new Date();
  var fecha = ahora.toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'});
  var hora = ahora.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
  var sol = {id:Date.now(), fecha:fecha, hora:hora, solicitante:solicitante, operadores:ops, estado:'pending'};
  solicitudes.unshift(sol);
  saveState();
  updateBadge();
  guardarEnSheet(sol);
  showToast('✅ Solicitud enviada a vigilancia');
  document.getElementById('solicitante').value = '';
  initForm();
}

var filtroActual = 'all';
function filterSol(f) { filtroActual = f; renderVigilancia(); }

function renderVigilancia() {
  var abiertos = {};
  var cuerpos = document.querySelectorAll('.sol-body');
  for (var k = 0; k < cuerpos.length; k++) {
    if (cuerpos[k].style.display === 'block') abiertos[cuerpos[k].id] = true;
  }
  var list = document.getElementById('sol-list');
  var data = [];
  for (var i = 0; i < solicitudes.length; i++) {
    var s = solicitudes[i];
    if (filtroActual === 'pending' && s.estado !== 'pending') continue;
    if (filtroActual === 'done' && s.estado !== 'done') continue;
    data.push(s);
  }
  if (data.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🚖</div><div>Sin solicitudes</div></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var sol = data[i];
    var pendientes = 0;
    for (var j = 0; j < sol.operadores.length; j++) { if (!sol.operadores[j].guardado) pendientes++; }
    var bClass = sol.estado === 'pending' ? 'badge-pending' : 'badge-done';
    var bText = sol.estado === 'pending' ? 'Pendiente (' + pendientes + ')' : 'Completado';
    html += '<div class="sol-card">';
    html += '<div class="sol-header ' + sol.estado + '" onclick="toggleSol(' + sol.id + ')">';
    html += '<div><span style="font-weight:700;font-size:1rem">' + sol.solicitante + '</span>';
    html += '<span style="font-size:.8rem;color:var(--muted)"> · ' + sol.hora + ' · ' + sol.operadores.length + ' persona(s)</span></div>';
    html += '<span class="badge-status ' + bClass + '">' + bText + '</span></div>';
    html += '<div class="sol-body" id="body-' + sol.id + '" style="display:none">';
    html += '<div style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem">Solicitado por: <strong>' + sol.solicitante + '</strong> · ' + sol.fecha + ' ' + sol.hora + '</div>';
    html += '<table class="vig-table"><thead><tr><th>N. Emp</th><th>Nombre</th><th>Depto.</th><th>Destino</th><th>Folio</th><th>Unidad</th><th></th></tr></thead><tbody>';
    for (var j = 0; j < sol.operadores.length; j++) {
      var op = sol.operadores[j];
      html += '<tr' + (op.guardado ? ' class="done-row"' : '') + '>';
      html += '<td>' + op.nom + '</td><td>' + op.nombre + '</td><td>' + (op.depto||'—') + '</td><td>' + (op.destino||'—') + '</td>';
      if (op.guardado) {
        html += '<td><strong>' + (op.folio||'—') + '</strong></td><td><strong>' + (op.unidad||'—') + '</strong></td><td style="color:var(--success)">✅</td>';
      } else {
        html += '<td><input type="text" placeholder="Folio" id="folio-' + sol.id + '-' + j + '" style="min-width:90px"></td>';
        html += '<td><input type="text" placeholder="Unidad" id="unidad-' + sol.id + '-' + j + '" style="min-width:90px"></td>';
        html += '<td><button class="btn btn-sm btn-success" onclick="guardarPersona(' + sol.id + ',' + j + ')">💾</button></td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  }
  list.innerHTML = html;
  for (var bodyId in abiertos) {
    var el = document.getElementById(bodyId);
    if (el) el.style.display = 'block';
  }
}

function toggleSol(id) {
  var body = document.getElementById('body-' + id);
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function guardarPersona(solId, opIdx) {
  var s = null;
  for (var i = 0; i < solicitudes.length; i++) { if (solicitudes[i].id === solId) { s = solicitudes[i]; break; } }
  if (!s) return;
  var folio = document.getElementById('folio-' + solId + '-' + opIdx).value.trim();
  var unidad = document.getElementById('unidad-' + solId + '-' + opIdx).value.trim();
  if (!folio) { showToast('⚠ Ingresa el folio'); return; }
  if (!unidad) { showToast('⚠ Ingresa la unidad'); return; }
  s.operadores[opIdx].folio = folio;
  s.operadores[opIdx].unidad = unidad;
  s.operadores[opIdx].guardado = true;
  var todos = true;
  for (var i = 0; i < s.operadores.length; i++) { if (!s.operadores[i].guardado) { todos = false; break; } }
  if (todos) s.estado = 'done';
  saveState();
  updateBadge();
  actualizarPersonaEnSheet(s, opIdx);
  renderVigilancia();
  showToast('✅ Guardado · Folio ' + folio + ' · Unidad ' + unidad);
}

function getBitacoraFilas() {
  var filas = [];
  for (var i = 0; i < solicitudes.length; i++) {
    var sol = solicitudes[i];
    for (var j = 0; j < sol.operadores.length; j++) {
      var op = sol.operadores[j];
      filas.push({fecha:sol.fecha, folio:op.folio||'', nom:op.nom, nombre:op.nombre, depto:op.depto||'—', destino:op.destino||'—', unidad:op.unidad||'—'});
    }
  }
  return filas;
}

function renderBitacora() {
  var fil = document.getElementById('fil-fecha').value;
  var tbody = document.getElementById('tbody-bitacora');
  var empty = document.getElementById('bitacora-empty');
  var filas = getBitacoraFilas();
  if (fil) {
    var parts = fil.split('-');
    var ff = parts[2] + '/' + parts[1] + '/' + parts[0];
    var filtered = [];
    for (var i = 0; i < filas.length; i++) { if (filas[i].fecha === ff) filtered.push(filas[i]); }
    filas = filtered;
  }
  filas.sort(function(a,b){ return (parseInt(a.folio)||0)-(parseInt(b.folio)||0); });
  if (filas.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  var html = '';
  for (var i = 0; i < filas.length; i++) {
    var f = filas[i];
    html += '<tr><td>' + f.fecha + '</td><td><strong>' + (f.folio||'—') + '</strong></td><td>' + f.nom + '</td><td>' + f.nombre + '</td><td>' + f.depto + '</td><td>' + f.destino + '</td><td>' + f.unidad + '</td></tr>';
  }
  tbody.innerHTML = html;
}

function exportarCSV() {
  var filas = getBitacoraFilas();
  filas.sort(function(a,b){ return (parseInt(a.folio)||0)-(parseInt(b.folio)||0); });
  var lines = ['FECHA,FOLIO,N. EMP,NOMBRE,DEPARTAMENTO,DESTINO,UNIDAD'];
  for (var i = 0; i < filas.length; i++) {
    var f = filas[i];
    lines.push([f.fecha, f.folio, f.nom, f.nombre, f.depto, f.destino, f.unidad].join(','));
  }
  var blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = 'bitacora_taxis.csv'; a.click();
}

function guardarEnSheet(sol) {
  var filas = [];
  for (var i = 0; i < sol.operadores.length; i++) {
    var op = sol.operadores[i];
    filas.push([sol.fecha, '', op.nom, op.nombre, op.depto||'', op.destino||'', '', 'PENDING', sol.hora, sol.solicitante, sol.id, i]);
  }
  fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'insert', rows:filas})}).catch(function(){});
}

function actualizarPersonaEnSheet(sol, opIdx) {
  var op = sol.operadores[opIdx];
  fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
    action:'updatePersona', id:sol.id, opIdx:opIdx, folio:op.folio, unidad:op.unidad, estado:'DONE'
  })}).catch(function(){});
}

function updateBadge() {
  var n = 0;
  for (var i = 0; i < solicitudes.length; i++) { if (solicitudes[i].estado === 'pending') n++; }
  var b = document.getElementById('notif-badge');
  b.style.display = n > 0 ? 'inline' : 'none';
  b.textContent = n;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

initForm();
updateBadge();
cargarPersonal();
</script>
